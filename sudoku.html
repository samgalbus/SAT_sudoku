<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku Solver</title>
  <link rel="stylesheet" href="/static/sudoku.css">
</head>
<body>
  <div class="page">
    <div id="grid"></div>
    <div class="panel">
      <h1>Sudoku Solver</h1>
      <button id="solve" type="button">Solve</button>
      <button id="clear" type="button">Clear</button>
      <label for="matrix">Insert your Matrix</label>
      <textarea id="matrix" spellcheck="false" placeholder="400003002&#10;092780540&#10;030009010&#10;609000020&#10;070000060&#10;050000107&#10;060800050&#10;025074680&#10;700900001"></textarea>
      <p id="status"></p>
    </div>
  </div>

  <script src="/static/sudoku.js"></script>
</body>
</html>
