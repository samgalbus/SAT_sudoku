{% extends "_base.html" %}

{% block title %}Reset password{% endblock %}
{% block title_key %}auth.resetTitle{% endblock %}

{% block content %}
<div class="reset-page">
  <div class="reset-card">
    <h1 data-i18n="auth.resetTitle">Choose a new password</h1>
    <form id="resetForm" class="auth-form">
      <input type="hidden" name="token" value="{{ token }}">
      <label><span data-i18n="auth.newPassword">New password</span>
        <input type="password" name="new_password" autocomplete="new-password" required minlength="8">
      </label>
      <label><span data-i18n="auth.confirm">Confirm password</span>
        <input type="password" name="confirm" autocomplete="new-password" required minlength="8">
      </label>
      <p class="auth-error" id="resetError" hidden></p>
      <p class="auth-info"  id="resetInfo"  hidden></p>
      <button type="submit" data-i18n="auth.savePassword">Save</button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
  const form = document.getElementById("resetForm");
  const err = document.getElementById("resetError");
  const info = document.getElementById("resetInfo");
  form.addEventListener("submit", async (ev) => {
    ev.preventDefault();
    err.hidden = true; info.hidden = true;
    const data = new FormData(form);
    if (data.get("new_password") !== data.get("confirm")) {
      err.textContent = (window.t ? t("auth.confirmMismatch") : "Passwords don't match.");
      err.hidden = false;
      return;
    }
    try {
      const res = await fetch("/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          token: data.get("token"),
          new_password: data.get("new_password"),
        }),
      });
      const json = await res.json();
      if (!json.success) {
        err.textContent = json.message || "Reset failed.";
        err.hidden = false;
        return;
      }
      info.textContent = (window.t ? t("auth.resetDone") : "Password reset. You can log in now.");
      info.hidden = false;
      form.querySelector("button[type=submit]").disabled = true;
      setTimeout(() => { window.location.href = "/"; }, 1500);
    } catch (e) {
      err.textContent = (window.t ? t("toast.networkError") : "Network error.");
      err.hidden = false;
    }
  });
})();
</script>
{% endblock %}
