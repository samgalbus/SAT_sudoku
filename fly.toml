# Fly.io config for SAT_sudoku.
# Run `fly launch --no-deploy` once to claim a unique app name, then `fly deploy`.
# Before first deploy:
#   fly volumes create sudoku_data --size 1 --region fra
#   fly secrets set SUDOKU_SECRET_KEY=$(python -c "import secrets; print(secrets.token_hex(32))")
#   fly secrets set MAIL_HOST=... MAIL_PORT=587 MAIL_USERNAME=... MAIL_PASSWORD=... MAIL_FROM=...

app = "sat-sudoku"
primary_region = "fra"

[build]

[env]
  SUDOKU_HOST = "0.0.0.0"
  SUDOKU_PORT = "8080"
  SUDOKU_DEBUG = "0"
  SUDOKU_DB_PATH = "/data/puzzles.db"

[[mounts]]
  source = "sudoku_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
